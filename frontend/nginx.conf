# Static SPA server: serve assets, fall back to index.html for client routes.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — let React Router handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
